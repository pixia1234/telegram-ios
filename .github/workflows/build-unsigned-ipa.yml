name: Build Unsigned Telegram IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "patches/**"
      - "scripts/**"
      - ".github/workflows/build-unsigned-ipa.yml"

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 720
    env:
      UPSTREAM_REF: fa93715135f8d9e16ca098c9e0c35d7e370af6ff

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone upstream Telegram iOS
        run: |
          set -euxo pipefail
          git clone --recursive -j8 https://github.com/TelegramMessenger/Telegram-iOS.git "$RUNNER_TEMP/telegram-ios"
          git -C "$RUNNER_TEMP/telegram-ios" checkout "$UPSTREAM_REF"
          git -C "$RUNNER_TEMP/telegram-ios" submodule sync --recursive
          git -C "$RUNNER_TEMP/telegram-ios" submodule update --init --recursive --jobs 8

      - name: Apply no-premium and no-ads patch
        run: |
          set -euxo pipefail
          "$GITHUB_WORKSPACE/scripts/apply_mods.sh" "$RUNNER_TEMP/telegram-ios"

      - name: Set active Xcode version
        run: |
          set -euxo pipefail
          XCODE_VERSION=$(python3 -c 'import json,sys;print(json.load(open(sys.argv[1]))["xcode"])' "$RUNNER_TEMP/telegram-ios/versions.json")
          sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer"
          xcodebuild -version

      - name: Build unsigned IPA
        env:
          BAZEL_USER_ROOT: /private/var/tmp/_bazel_containerhost
        run: |
          set -euxo pipefail
          SOURCE_DIR="$RUNNER_TEMP/telegram-ios"
          cd "$SOURCE_DIR"

          BUILD_NUMBER_OFFSET="$(cat "$SOURCE_DIR/build_number_offset")"
          APP_VERSION="$(python3 -c 'import json,sys;print(json.load(open(sys.argv[1]))["app"])' "$SOURCE_DIR/versions.json")"
          COMMIT_COUNT="$(git -C "$SOURCE_DIR" rev-list --count HEAD)"
          BUILD_NUMBER="$((COMMIT_COUNT + BUILD_NUMBER_OFFSET))"

          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

          # 11.9.0 fake-codesigning keeps this profile at the root; Make.py reads from profiles/.
          if [[ -f "$SOURCE_DIR/build-system/fake-codesigning/BroadcastUpload.mobileprovision" ]]; then
            cp -f "$SOURCE_DIR/build-system/fake-codesigning/BroadcastUpload.mobileprovision" \
              "$SOURCE_DIR/build-system/fake-codesigning/profiles/BroadcastUpload.mobileprovision"
          fi

          python3 "$SOURCE_DIR/build-system/Make/ImportCertificates.py" --path "$SOURCE_DIR/build-system/fake-codesigning/certs"

          python3 -u "$SOURCE_DIR/build-system/Make/Make.py" \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --bazelArguments="--//Telegram:disableProvisioningProfiles" \
            build \
            --configurationPath="$SOURCE_DIR/build-system/appstore-configuration.json" \
            --codesigningInformationPath="$SOURCE_DIR/build-system/fake-codesigning" \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

      - name: Collect artifacts
        run: |
          set -euxo pipefail
          SOURCE_DIR="$RUNNER_TEMP/telegram-ios"
          OUTPUT_DIR="$RUNNER_TEMP/artifacts"
          mkdir -p "$OUTPUT_DIR"

          shopt -s nullglob
          IPA_FILES=("$SOURCE_DIR"/bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa)
          if [[ ${#IPA_FILES[@]} -eq 0 ]]; then
            echo "No IPA produced" >&2
            exit 1
          fi
          cp "${IPA_FILES[0]}" "$OUTPUT_DIR/Telegram-unsigned.ipa"

          mkdir -p "$SOURCE_DIR/build/DSYMs"
          DSYM_FILES=("$SOURCE_DIR"/bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM)
          if [[ ${#DSYM_FILES[@]} -gt 0 ]]; then
            cp -R "${DSYM_FILES[@]}" "$SOURCE_DIR/build/DSYMs/"
            (cd "$SOURCE_DIR" && zip -r "$OUTPUT_DIR/Telegram.DSYMs.zip" build/DSYMs >/dev/null)
          fi

          shasum -a 256 "$OUTPUT_DIR/Telegram-unsigned.ipa" | tee "$OUTPUT_DIR/SHA256SUMS.txt"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-unsigned-ipa-${{ env.BUILD_NUMBER }}
          path: |
            ${{ runner.temp }}/artifacts/Telegram-unsigned.ipa
            ${{ runner.temp }}/artifacts/Telegram.DSYMs.zip
            ${{ runner.temp }}/artifacts/SHA256SUMS.txt
          if-no-files-found: error
